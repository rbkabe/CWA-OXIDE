spring_fever:
  icon_set_id: 1935
  name_id: 60026
  # animation_id 913 (Loc_FlourishPack1_PreviewStand) was wrong: per
  # AnimationTypes.xml it's type="1" Locomotion, part of the "Marketplace
  # Preview" branch (901-916), authored as a store-pedestal idle pose that
  # is designed to loop forever - never a finite in-world attack animation.
  # That's why it never stopped, both via ./test913 and the real
  # RequestStartCast path.
  #
  # Switched to Com_HeavyHipGun_Attack1 (id 1537), a type="2" Combat-branch
  # animation matching Spring Fever's HeavyHipGun weapon class. Attack
  # slots have no loop/holdLastFrame attribute (that flag only appears on
  # Death poses in the schema), so they're finite by design - this should
  # self-terminate like the slot-0 attack does.
  #
  # 1537 self-terminates correctly but is the GENERIC HeavyHipGun attack -
  # confirmed in-game it has no flourish/spray effects (expected: it's a
  # plain combat clip with nothing baked in).
  #
  # Candidates with the actual baked-in flourish effects (type="12"
  # Flourish, nested in the normal HeavyHipGun Locomotion branch, NOT the
  # Marketplace Preview branch like 913 was): 289 (Loc_HeavyHipGun_Fourish1),
  # 290/291/292 (Loc_HeavyHipGun_FlourishPack1_Move1/2/3) - CONFIRMED via
  # ./testanim: 290/291/292 self-terminate and have effects + sound.
  animation_id: 1537

